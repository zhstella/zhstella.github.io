<!doctype html>

      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

      body {

        margin: 0;
        display: grid;

      }

      .mark {
        display: grid;
        width: 4rem;
        height: 4rem;
        margin: 0 auto 1.25rem;
        place-items: center;
        border-radius: 1rem;
        background: #2f6f9f;
        color: #fff;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.75rem, 5vw, 2.5rem);
      }

      p {
        margin: 0 0 1.5rem;
        color: #526b80;
        line-height: 1.6;
      }

      a {
        display: inline-block;
        padding: 0.8rem 1.1rem;
        border-radius: 0.7rem;
        background: #2f6f9f;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
